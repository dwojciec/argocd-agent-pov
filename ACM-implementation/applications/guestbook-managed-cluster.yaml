# Hub-side Application: Argo CD reconciles it from namespace openshift-gitops (must be in
# spec.sourceNamespaces on the hub Argo CD CR — see principal/argocd/argocd-principal.yaml).
#
# AppProject `managed-clusters-project` must exist on the hub (often created by ACM GitOps).
#
# Replace <managed-cluster> in destination.server (?agentName=…) with the hub ManagedCluster /
# cluster secret name (PoV example: a-cluster).
#
# Apply (hostname only, no https:// — from repo root):
#   set -a && [ -f envsubst.env ] && . envsubst.env && set +a
#   envsubst '${PRINCIPAL_ROUTE_HOST}' < ACM-implementation/applications/guestbook-managed-cluster.yaml | oc apply -f -
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook
  namespace: openshift-gitops
spec:
  project: managed-clusters-project
  source:
    repoURL: https://github.com/argoproj/argocd-example-apps.git
    targetRevision: HEAD
    path: guestbook
  destination:
    server: https://${PRINCIPAL_ROUTE_HOST}/?agentName=<managed-cluster>
    namespace: guestbook-deploy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
