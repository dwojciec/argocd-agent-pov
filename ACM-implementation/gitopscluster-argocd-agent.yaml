# Registers clusters matched by Placement with the hub Argo CD instance and enables the GitOps add-on with Argo CD Agent (ACM controller fills serverAddress/serverPort when needed).
# Apply after: principal Argo CD + Placement exist; see README.
apiVersion: apps.open-cluster-management.io/v1beta1
kind: GitOpsCluster
metadata:
  name: gitops-agent-clusters
  namespace: openshift-gitops
spec:
  argoServer:
    argoNamespace: openshift-gitops
  placementRef:
    apiVersion: cluster.open-cluster-management.io/v1beta1
    kind: Placement
    name: placement-managed-clusters
    namespace: openshift-gitops
  gitopsAddon:
    enabled: true
    overrideExistingConfigs: true
    argoCDAgent:
      enabled: true
      propagateHubCA: true
      mode: managed 
