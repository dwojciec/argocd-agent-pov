# Selects managed clusters by label `name` within ManagedClusterSet `poc-acm`
# (requires ManagedClusterSetBinding in this namespace).
# Replace each `values` entry with your ManagedCluster label (PoV example: a-cluster, b-cluster).
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-managed-clusters
  namespace: openshift-gitops
spec:
  clusterSets:
    - poc-acm
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchExpressions:
            - key: name
              operator: In
              values:
                - <managed-cluster>
                - <managed-cluster>
