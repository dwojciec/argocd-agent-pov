# Application « managed » : à appliquer sur le cluster PRINCIPAL uniquement.
# Le champ destination.name doit correspondre au nom du secret cluster (cluster-managed-cluster → name: managed-cluster).
# Démo minimale : chart helm-guestbook (https://github.com/argoproj/argocd-example-apps/tree/master/helm-guestbook).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-managed-demo
  namespace: managed-cluster
spec:
  project: default
  destination:
    name: managed-cluster
    namespace: default
  source:
    repoURL: https://github.com/argoproj/argocd-example-apps
    path: helm-guestbook
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
