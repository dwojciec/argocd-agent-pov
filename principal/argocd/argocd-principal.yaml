# Instance Argo CD « control plane » : UI/API sur le principal, contrôleur désactivé, Principal activé.
# Contrainte connue : ne pas réutiliser une instance Argo CD existante avec controller activé pour le même namespace.
# Remplacer chaque <managed-cluster> dans ARGOCD_PRINCIPAL_ALLOWED_NAMESPACES par le nom du spoke (ex. PoV : a-cluster, b-cluster).
apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  name: principal
  namespace: openshift-gitops
spec:
  controller:
    enabled: false
  argoCDAgent:
    principal:
      enabled: true
      auth: mtls:CN=system:open-cluster-management:cluster:([^:]+):addon:gitops-addon:agent:gitops-addon-agent
      logLevel: trace
      env:
        - name: ARGOCD_PRINCIPAL_DESTINATION_BASED_MAPPING
          value: 'true'
        # PoV example (two spokes): openshift-gitops,a-cluster,b-cluster
        - name: ARGOCD_PRINCIPAL_ALLOWED_NAMESPACES
          value: 'openshift-gitops,<managed-cluster>,<managed-cluster>'
      tls:
        insecureGenerate: false
      jwt:
        insecureGenerate: false
  # Namespaces du hub où des Application peuvent être définies (Apps in any namespace).
  sourceNamespaces:
    - "agent-managed"
    - "agent-autonomous"
  server:
    route:
      enabled: true