apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: autonomous-cluster-principal
  namespace: openshift-gitops
spec:
  secretName: autonomous-cluster-principal
  issuerRef:
    name: argocd-agent-ca
    kind: Issuer
  commonName: autonomous-cluster
  dnsNames:
    - autonomous-cluster.argocd-agent.local
