# Nécessite d’abord : kubectl create secret tls argocd-agent-ca --cert=ca.crt --key=ca.key -n openshift-gitops
# (génération openssl décrite dans le README.)
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: argocd-agent-ca
  namespace: openshift-gitops
spec:
  ca:
    secretName: argocd-agent-ca
