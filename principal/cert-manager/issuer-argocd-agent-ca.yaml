# Nécessite d’abord : kubectl create secret tls argocd-agent-ca --cert=ca.crt --key=ca.key -n gitops-control-plane
# (génération openssl décrite dans le README.)
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: argocd-agent-ca
  namespace: gitops-control-plane
spec:
  ca:
    secretName: argocd-agent-ca
